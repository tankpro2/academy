<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>
    window.consoleLogs = [];
    (function() {
      var capture = function(type, args) {
        var msg = "[" + type + "] " + args.map(function(a) {
          return typeof a === 'object' ? JSON.stringify(a) : String(a);
        }).join(" ");
        window.consoleLogs.push(msg);
        var el = document.getElementById("debugConsoleLogs");
        if (el) {
          var p = document.createElement('p');
          p.innerText = msg;
          el.appendChild(p);
        }
      };
      var origLog = console.log;
      console.log = function() {
        capture("LOG", Array.prototype.slice.call(arguments));
        origLog.apply(console, arguments);
      };
      var origError = console.error;
      console.error = function() {
        capture("ERROR", Array.prototype.slice.call(arguments));
        origError.apply(console, arguments);
      };
      var origWarn = console.warn;
      console.warn = function() {
        capture("WARN", Array.prototype.slice.call(arguments));
        origWarn.apply(console, arguments);
      };
    })();

    window.onerror = function(message, source, lineno, colno, error) {
      var div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0';
      div.style.left = '0';
      div.style.width = '100%';
      div.style.backgroundColor = '#e11d48';
      div.style.color = 'white';
      div.style.padding = '20px';
      div.style.zIndex = '999999';
      div.style.fontSize = '15px';
      div.style.fontFamily = 'monospace';
      div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
      div.innerHTML = '<h3 style="margin:0 0 10px 0; font-size:18px;">🚨 JavaScript 실행 오류 발생</h3>' + 
                      '<strong>오류 메시지:</strong> ' + message + '<br>' +
                      '<strong>발생 파일:</strong> ' + source + '<br>' +
                      '<strong>라인 번호:</strong> ' + lineno + '라인, ' + colno + '열';
      var target = document.body || document.documentElement;
      if (target) target.appendChild(div);
      return false;
    };
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유주코칭국어학원 - 학원통합관리시스템</title>
  
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Supabase JS Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. 로그인 / 비밀번호 변경 화면 -->
  <div id="loginScreen" class="login-overlay" style="display: none;">
    <!-- 로그인 폼 카드 -->
    <div id="loginCard" class="login-card">
      <div class="login-header">
        <div class="logo"><i data-lucide="book-open"></i></div>
        <h1>유주 국어학원</h1>
        <p>학원통합관리시스템 로그인</p>
      </div>
      
      <form id="loginForm" onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label for="loginUsername">이름 (ID)</label>
          <input type="text" id="loginUsername" placeholder="등록된 이름을 입력하세요" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPassword">비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">
          <i data-lucide="log-in"></i> 로그인
        </button>
      </form>
      <div style="text-align: center; margin-top: 16px;">
        <button onclick="openPublicHomepage()" style="width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--primary-color); color: var(--primary-color); border-radius: var(--radius-md); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <i data-lucide="home"></i> 🏠 소개 홈화면으로 돌아가기
        </button>
      </div>
    </div>

    <!-- 비밀번호 강제 변경 카드 (최초 로그인 1234 대응) -->
    <div id="changePwCard" class="login-card" style="display: none;">
      <div class="login-header">
        <div class="logo"><i data-lucide="shield-alert"></i></div>
        <h1>비밀번호 변경</h1>
        <p>최초 로그인 시 안전을 위해 반드시 변경해야 합니다.</p>
      </div>
      
      <form id="changePwForm" onsubmit="handleChangePwSubmit(event)">
        <div class="form-group">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" placeholder="새 비밀번호 입력" required oninput="validateNewPassword(this.value)">
          
          <!-- 규칙 가이드박스 -->
          <div class="pw-guide">
            <p>비밀번호 설정 조건 (8자리 이상):</p>
            <div class="pw-rule-item" id="ruleLength"><i data-lucide="x"></i> 8자리 이상</div>
            <div class="pw-rule-item" id="ruleLetter"><i data-lucide="x"></i> 영문 포함</div>
            <div class="pw-rule-item" id="ruleNumber"><i data-lucide="x"></i> 숫자 포함</div>
            <div class="pw-rule-item" id="ruleSpecial"><i data-lucide="x"></i> 특수문자 포함</div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="동일한 비밀번호 재입력" required oninput="checkPwMatch()">
          <span id="pwMatchMessage" style="font-size: 11px; font-weight: bold; display: block; margin-top: 4px;"></span>
        </div>
        
        <button type="submit" id="btnSubmitNewPw" class="btn-primary" disabled>
          <i data-lucide="check"></i> 변경 및 시스템 사용하기
        </button>
      </form>
    </div>
  </div>

  <!-- 1-2. 퍼블릭 학원 소개 홈페이지 화면 -->
  <div id="publicHomepageScreen" class="public-homepage-overlay" style="display: block;">
    <!-- 동적으로 렌더링 예정 -->
  </div>

  <!-- 2. 메인 애플리케이션 화면 -->
  <div id="appScreen" class="app-container" style="display: none;">
    <!-- 사이드바 네비게이션 -->
    <aside class="sidebar no-print">
      <div class="sidebar-header">
        <i data-lucide="book-open"></i>
        <h2>유주 통합관리</h2>
      </div>
      
      <div class="user-profile-badge">
        <span class="user-name" id="profileName">김유주</span>
        <span class="user-role" id="profileRole">원장</span>
      </div>
      
      <nav class="sidebar-menu" id="sidebarMenu">
        <!-- 역할별 동적 메뉴 렌더링 -->
      </nav>
      
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="handleLogout()">
          <i data-lucide="log-out"></i> 로그아웃
        </button>
      </div>
    </aside>

    <!-- 메인 콘텐츠 뷰 영역 -->
    <main class="main-content" id="mainContent">
      <!-- 동적 메뉴 렌더러에 의해 각 뷰가 삽입됨 -->
    </main>
  </div>

  <!-- 3. 글로벌 모달 오버레이 (폼 및 알림용) -->
  <div id="globalModal" class="modal-overlay" style="display: none;">
    <div class="modal-content" id="modalContent">
      <!-- 동적 모달 콘텐츠 로딩 -->
    </div>
  </div>

  <!-- 디버그 콘솔 로그 콘테이너 -->
  <div id="debugConsoleLogs" style="display: none;"></div>

  <!-- 비즈니스 로직 스크립트 로드 -->
  <script src="mockData.js"></script>
  <script src="app.js"></script>
</body>
</html>
